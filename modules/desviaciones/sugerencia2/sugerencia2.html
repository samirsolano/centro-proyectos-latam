<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Sugerencia de Mejora</title>

    <link rel="stylesheet"
          href="sugerencia2.css">

</head>

<body>

    <div class="header">

        <div class="tituloHeader">
            Sugerencia de mejora
        </div>

    </div>

    <div class="contenedor">

        <div class="tituloPrincipal">
            PROPUESTA DE MEJORA
        </div>

        <!-- SITUACIÓN -->

        <div class="pregunta">
            1. Situación actual
        </div>

        <div class="contenedorTexto">

            <textarea
                id="situacionActual"
                maxlength="600"
                placeholder="Describe brevemente la situación actual..."
                oninput="actualizarContador(this,'contador1')"></textarea>

            <div
                id="contador1"
                class="contador">

                0/600

            </div>

        </div>

        <!-- PROPUESTA -->

        <div class="pregunta espacioSuperior">
            2. Propuesta de mejora
        </div>

        <div class="contenedorTexto">

            <textarea
                id="propuestaMejora"
                maxlength="600"
                placeholder="Describe tu propuesta de mejora..."
                oninput="actualizarContador(this,'contador2')"></textarea>

            <div
                id="contador2"
                class="contador">

                0/600

            </div>

        </div>

        <!-- BENEFICIOS -->

        <div class="pregunta espacioSuperior">
            3. Beneficio esperado
        </div>

        <div class="subtitulo">
            (Selecciona uno o más)
        </div>

        <div class="gridBeneficios">

            <div class="beneficio"
                onclick="toggleBeneficio(this,'PRODUCTIVIDAD')">

                <div class="check">✓</div>

                <img src="../../../shared/assets/icons/mejoras/productividad.png">

                <span>Productividad</span>

            </div>

            <div class="beneficio"
                onclick="toggleBeneficio(this,'CALIDAD')">

                <div class="check">✓</div>

                <img src="../../../shared/assets/icons/mejoras/calidad.png">

                <span>Calidad</span>

            </div>

            <div class="beneficio"
                onclick="toggleBeneficio(this,'SEGURIDAD')">

                <div class="check">✓</div>

                <img src="../../../shared/assets/icons/mejoras/seguridad.png">

                <span>Seguridad</span>

            </div>

            <div class="beneficio"
                onclick="toggleBeneficio(this,'TIEMPO')">

                <div class="check">✓</div>

                <img src="../../../shared/assets/icons/mejoras/tiempo.png">

                <span>Tiempo</span>

            </div>

            <div class="beneficio"
                onclick="toggleBeneficio(this,'AHORRO')">

                <div class="check">✓</div>

                <img src="../../../shared/assets/icons/mejoras/ahorro.png">

                <span>Ahorro</span>

            </div>

            <div class="beneficio"
                onclick="toggleBeneficio(this,'SOSTENIBILIDAD')">

                <div class="check">✓</div>

                <img src="../../../shared/assets/icons/mejoras/sostenibilidad.png">

                <span>Sostenibilidad</span>

            </div>

        </div>

        <!-- BOTONES -->

        <div class="botones">

            <button
                class="btnAtras"
                onclick="volver()">

                ← Atrás

            </button>

            <button
                class="btnSiguiente"
                onclick="continuar()">

                Continuar →

            </button>

        </div>

    </div>

    <!-- MODAL VALIDACIÓN -->

    <div id="modalValidacion" class="modalOculto">

        <div class="modalContenido">

            <div class="modalTitulo">
                ⚠️ Información incompleta
            </div>

            <div class="modalTexto">
                Completa todos los campos requeridos para continuar.
            </div>

            <button
                class="btnModal"
                onclick="cerrarModal()">

                Entendido

            </button>

        </div>

    </div>

    <script src="sugerencia2.js"></script>

</body>

</html>
