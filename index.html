<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LATAM 400 CL</title>

<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0047d4">
    
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{

    min-height:100vh;

    background:linear-gradient(
        to bottom,
        #ffffff 0%,
        #f7f9ff 70%,
        #dbe7ff 100%
    );

    overflow-x:hidden;
}

.container{
    width:100%;
    max-width:430px;
    margin:auto;
    padding:25px 25px 0;
    text-align:center;
}

/* LOGO */

.logo{
    font-size:92px;
    font-weight:900;
    color:#0047d4;
    line-height:1;
    letter-spacing:-2px;
}

.sublogo{

    margin-top:8px;

    font-size:28px;
    font-weight:bold;

    color:#8e8e8e;
}

.linea{

    width:120px;
    height:5px;

    background:#ff3636;

    border-radius:50px;

    margin:15px auto;
}

/* TITULO */

.titulo{
    color:#00379d;
    font-size:30px;
    font-weight:800;
    line-height:1.1;
    margin-bottom:20px;
}

/* ICONO */

.icono{
    width:150px;
    height:150px;

    border:4px solid #0047d4;
    border-radius:50%;

    margin:10px auto 15px;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:75px;

    color:#0047d4;
}
    
/* BIENVENIDA */

.bienvenido{

    color:#00379d;

    font-size:28px;
    font-weight:bold;

    margin-bottom:18px;
}

.ingrese{

    color:#00379d;

    font-size:20px;
    font-weight:bold;

    margin-bottom:15px;
}

/* INPUT */



.input-box::placeholder{

    color:#b0b0b0;
}


.input-container{

    display:flex;
    align-items:center;

    border:2px solid #bfd0ff;

    border-radius:18px;

    background:white;

    padding:0 18px;

    box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.input-icon{

    font-size:30px;

    margin-right:10px;

    color:#7a7a7a;
}

.input-box{

    flex:1;

    border:none;

    padding:22px 0;

    font-size:20px;

    outline:none;

    text-align:left;
}

/* BOTON */

.btn{

    width:100%;

    margin-top:22px;

    padding:22px;

    border:none;

    border-radius:18px;

    background:#0047d4;

    color:white;

    font-size:24px;
    font-weight:bold;

    box-shadow:0 6px 18px rgba(0,0,0,.18);

    cursor:pointer;
}

/* VERSION */

.version{

    margin-top:15px;

    color:#8c8c8c;

    font-size:13px;

    opacity:.8;
}

/* ONDA */

.wave{
    width:100%;
    height:90px;
    overflow:hidden;
    margin-top:20px;
}

.wave svg{
    width:100%;
    height:100%;
}
/* CREDITOS */

.creditos{

    background:#dbe7ff;

    padding:5px 15px 15px;

    text-align:center;
}

.creditos-titulo{

    color:#6d6d6d;

    font-size:13px;
}

.creditos-nombres{

    margin-top:6px;

    color:#00379d;

    font-size:12px;
    font-weight:bold;
}

.creditos-linea{

    width:160px;
    height:2px;

    background:#0047d4;

    margin:10px auto;
}

.creditos-final{

    color:#6f6f6f;

    font-size:12px;
}

/* ===== MODAL ===== */

.modal{

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;

    background:rgba(0,0,0,.45);

    display:none;

    justify-content:center;
    align-items:center;

    z-index:9999;
}

.modalBox{

    width:90%;
    max-width:340px;

    background:white;

    border-radius:24px;

    padding:25px;

    text-align:center;

    box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.modalIcono{

    font-size:60px;

    margin-bottom:10px;
}

.modalTitulo{

    color:#00379d;

    font-size:22px;

    font-weight:bold;

    margin-bottom:10px;
}

.modalMensaje{

    color:#555;

    font-size:16px;

    line-height:1.5;

    margin-bottom:20px;
}

.modalBtn{

    width:100%;

    border:none;

    border-radius:14px;

    padding:16px;

    background:#0047d4;

    color:white;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

    <div class="logo">
        LATAM
    </div>

    <div class="sublogo">
        400 CL
    </div>

    <div class="linea"></div>

    <div class="titulo">
        CENTRO DE PROYECTOS
    </div>

    <div class="icono">
        👥
    </div>

    <div class="bienvenido">
        Bienvenido
    </div>

    <div class="ingrese">
        Ingrese su DNI
    </div>

    <div class="input-container">

    <span class="input-icon">🪪</span>

    <input
        id="dni"
        class="input-box"
        type="tel"
        inputmode="numeric"
        maxlength="8"
        placeholder="Ej: 12345678">
     
    </div>

    <button
        class="btn"
        onclick="probarDNI()">
        ➜ INGRESAR
    </button>

    <div class="version">
        Versión 1.0
    </div>

</div>

<div class="wave">
    <svg viewBox="0 0 500 120" preserveAspectRatio="none">
        <path d="M0,20 C150,120 350,120 500,20 L500,120 L0,120 Z"
              fill="#dbe7ff">
        </path>
    </svg>
</div>    
    
<div class="creditos">

    <div class="creditos-titulo">
        👥 Desarrollado por
    </div>

    <div class="creditos-nombres">
        Samir Solano Velita • Gabriela Cisneros Zúñiga
    </div>

    <div class="creditos-linea"></div>

    <div class="creditos-final">
        Innovación • Calidad • Compromiso
    </div>

</div>
<!-- MODAL -->

<div id="modal" class="modal">

    <div class="modalBox">

        <div
            id="modalIcono"
            class="modalIcono">
            ⚠️
        </div>

        <div
            id="modalTitulo"
            class="modalTitulo">
            Título
        </div>

        <div
            id="modalMensaje"
            class="modalMensaje">
            Mensaje
        </div>

        <button
            class="modalBtn"
            onclick="cerrarModal()">

            ACEPTAR

        </button>

    </div>

</div>

<script>

let usuariosCache = [];

window.onload = async function(){

    try{

        const respuesta =
        await fetch(
        "https://script.google.com/macros/s/AKfycbzHu5hoVNiEAtyuCpOWv3Y8Fs-u15H3e4t6LqV-K7rpwvxpDkdF39OQ_vkTk_MMZANN/exec?usuarios=1"
        );

        usuariosCache =
        await respuesta.json();

        console.log(
        "Usuarios cargados:",
        usuariosCache.length
        );

    }catch(error){

        console.error(
        "Error cargando usuarios",
        error
        );

    }

}
    

function probarDNI(){

    const dni =
    document
    .getElementById("dni")
    .value
    .trim();

    if(dni === ""){

        mostrarModal(
            "⚠️",
            "DNI REQUERIDO",
            "Ingrese su número de DNI."
        );

        return;
    }

    if(dni.length !== 8){

        mostrarModal(
            "⚠️",
            "DNI INVÁLIDO",
            "El DNI debe tener 8 dígitos."
        );

        return;
    }

    const usuario =
    usuariosCache.find(
        x => x.dni === dni
    );

    if(usuario){

        localStorage.setItem(
            "dni",
            dni
        );

        localStorage.setItem(
            "nombre",
            usuario.nombre
        );

        localStorage.setItem(
            "puesto",
            usuario.puesto
        );

        localStorage.setItem(
            "jd",
            usuario.jd
        );

        mostrarModal(
            "✅",
            "BIENVENIDO",
            usuario.nombre
        );

        setTimeout(() => {

            window.location.href =
            "./modules/inicio/home.html";

        },1500);

    }else{

        mostrarModal(
            "⚠️",
            "DNI NO ENCONTRADO",
            "Comunícate con tu supervisor para validar tu registro."
        );

    }

}    
function mostrarModal(
    icono,
    titulo,
    mensaje
){

    document.getElementById(
        "modalIcono"
    ).textContent = icono;

    document.getElementById(
        "modalTitulo"
    ).textContent = titulo;

    document.getElementById(
        "modalMensaje"
    ).textContent = mensaje;

    document.getElementById(
        "modal"
    ).style.display = "flex";

}

function cerrarModal(){

    document.getElementById(
        "modal"
    ).style.display = "none";

}

</script>

<script>

if("serviceWorker" in navigator){

    navigator.serviceWorker
        .register("./service-worker.js")
        .then(() => {

            console.log(
                "PWA lista"
            );

        });

}

</script>

</body>
</html>
